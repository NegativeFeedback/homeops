---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: synapse
  namespace: database
spec:
  cluster:
    name: postgres
  name: gdd-social-synapse
  owner: gdd-social-synapse-user
  ensure: present
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: synapse-db-password
  namespace: database
spec:
  length: 48
  digits: 10
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse-db-secret
  namespace: database
spec:
  refreshInterval: "0" # generate password once; rotation breaks long-lived consumers (see jellystat/inventree)
  target:
    name: synapse-db-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: gdd-social-synapse-user
        password: "{{ .password | toString }}"
        POSTGRES_URL: "postgresql://gdd-social-synapse-user:{{ .password | toString }}@postgres-rw.database.svc.cluster.local:5432/gdd-social-synapse"
        POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_DB: "gdd-social-synapse"
        POSTGRES_USER: "gdd-social-synapse-user"
        POSTGRES_PASSWORD: "{{ .password | toString }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: synapse-db-password
