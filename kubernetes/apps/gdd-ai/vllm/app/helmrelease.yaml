---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      vllm:
        strategy: Recreate
        initContainers:
          # Runs once: downloads the BF16 model to the PVC. No separate quantize
          # step — the app quantizes to INT4 online at load via --quantization
          # sym_int4 (Intel XPU's supported INT4 path; AWQ/GPTQ-Marlin are CUDA-only,
          # and no pre-quantized GPTQ of this abliterated model exists). Kept as an
          # init (not probe-gated, unlike the app) so the ~64GB pull can't trip the
          # readiness probe. Skips immediately once the model is present.
          download:
            image:
              repository: intel/llm-scaler-vllm
              tag: 0.14.0-b8.2
            command:
              - /bin/bash
              - -c
            args:
              - |
                set -e
                BF16_DIR=/models/Qwen3-32B-abliterated
                if [ -f "${BF16_DIR}/config.json" ]; then
                  echo "Model already downloaded."; exit 0
                fi
                python3 -m pip install -q hf-transfer huggingface_hub
                HF_HUB_ENABLE_HF_TRANSFER=1 huggingface-cli download \
                  huihui-ai/Qwen3-32B-abliterated \
                  --local-dir ${BF16_DIR} \
                  --local-dir-use-symlinks False
            resources:
              requests:
                cpu: "2"
                memory: 8Gi
              limits:
                memory: 16Gi
        containers:
          app:
            image:
              repository: intel/llm-scaler-vllm
              tag: 0.14.0-b8.2
            command:
              - /bin/bash
              - -c
            args:
              - |
                source /opt/intel/oneapi/setvars.sh --force
                exec vllm serve /models/Qwen3-32B-abliterated \
                  --served-model-name Qwen3-32B-abliterated \
                  --quantization sym_int4 \
                  --host 0.0.0.0 \
                  --port 8000 \
                  --gpu-memory-util 0.90 \
                  --max-model-len 32768 \
                  --trust-remote-code \
                  --enforce-eager
            env:
              TZ: America/Chicago
              VLLM_WORKER_MULTIPROC_METHOD: spawn
              VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
              ZES_ENABLE_SYSMAN: "1"
              ONEAPI_DEVICE_SELECTOR: "level_zero:*"
              SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS: "1"
              no_proxy: localhost,127.0.0.1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 120
                  periodSeconds: 30
                  failureThreshold: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 500m
                memory: 8Gi
                gpu.intel.com/xe: "1"
              limits:
                memory: 32Gi
                gpu.intel.com/xe: "1"
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: In
                    values: ["true"]
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["gddnet-w9"]
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      models:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 200Gi
        globalMounts:
          - path: /models
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 32Gi
        globalMounts:
          - path: /dev/shm
      tmp:
        type: emptyDir
