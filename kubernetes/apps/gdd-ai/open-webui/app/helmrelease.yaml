---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: ollama
      namespace: gdd-ai
  values:
    controllers:
      open-webui:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: main
            env:
              TZ: America/Chicago
              OLLAMA_BASE_URL: http://ollama.gdd-ai.svc.cluster.local:11434
              WEBUI_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: secret_key
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 500Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
#    route:
#      app:
#        hostnames: ["open-webui.${SECRET_DOMAIN}"]
#        annotations:
#          gethomepage.dev/enabled: "true"
#          gethomepage.dev/group: AI
#          gethomepage.dev/name: Open WebUI
#          gethomepage.dev/icon: open-webui.svg
#          gethomepage.dev/description: "Chat interface for local LLMs"
#        parentRefs:
#          - name: external
#            namespace: kube-system
#            sectionName: https
#        rules:
#          - backendRefs:
#              - identifier: app
#                port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/backend/data
