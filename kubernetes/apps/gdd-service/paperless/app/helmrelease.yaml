---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      paperless:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.13@sha256:4b05bcd28e6923768000b5d247cbf2c66fd49bdc3f3b05955bd4f6790a638b01
            env:
              PROMETHEUS_ENABLED: true
              TZ: America/Chicago
              PAPERLESS_URL: https://paperless.barn-walleye.ts.net
              PAPERLESS_TIME_ZONE: America/Chicago
              PAPERLESS_WEBSERVER_WORKERS: "2"
              PAPERLESS_TASK_WORKERS: "2"
              PAPERLESS_ACCOUNT_ALLOW_SIGNUPS: "false"
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "true"
              PAPERLESS_CONSUMPTION_DIR: /data/consume
              PAPERLESS_DATA_DIR: /config/data
              PAPERLESS_MEDIA_ROOT: /config/media
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_OCR_LANGUAGES: "chi-sim chi-tra eng"
              PAPERLESS_OCR_LANGUAGE: chi_sim+chi_tra+eng
              PAPERLESS_REDIS: redis://dragonfly.database.svc.cluster.local:6379/0
              USERMAP_UID: "1000"
              USERMAP_GID: "1000"
              PAPERLESS_ENABLE_ALLAUTH: "true"
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_AUTO_LOGIN: "true"
              PAPERLESS_AUTO_CREATE: "true"
              PAPERLESS_LOGOUT_REDIRECT_URL: https://sso.gddnet.io/application/o/paperless/end-session/
              PAPERLESS_TIKA_ENABLED: "true"
              PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
              PAPERLESS_GOTENBERG_ENDPOINT: http://localhost:3000
              PAPERLESS_PRE_CONSUME_SCRIPT: /scripts/rotate180.sh
            envFrom:
              - secretRef:
                  name: paperless-secret
            resources:
              requests:
                cpu: 100m
                memory: 250Mi
              limits:
                memory: 5Gi

          tika:
            image:
              repository: docker.io/apache/tika
              tag: 3.3.0.0
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

          gotenberg:
            image:
              repository: docker.io/gotenberg/gotenberg
              tag: "8"
            args:
              - gotenberg
              - --chromium-disable-routes=true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

          paperless-gpt:
            image:
              repository: ghcr.io/icereed/paperless-gpt
              tag: latest
            env:
              PAPERLESS_BASE_URL: http://127.0.0.1:8000
              LLM_PROVIDER: ollama
              LLM_MODEL: llama3.2:3b
              OLLAMA_HOST: http://ollama.gdd-ai.svc.cluster.local:11434
              AUTO_TAG: "paperless-gpt-auto"
              AUTO_TITLE: "true"
              AUTO_OCR_TAG: "paperless-gpt-ocr-auto"
              MANUAL_TAG: "paperless-gpt-manual"
              PDF_OCR_TAGGING: "true"
              PDF_OCR_COMPLETE_TAG: "paperless-gpt-ocr-complete"
            envFrom:
              - secretRef:
                  name: paperless-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

          scanservjs:
            image:
              repository: ghcr.io/negativefeedback/scanservjs
              tag: sha-63ce849@sha256:5c5cb3f8551cc28d71efb896116f4c3bc072263d6d8978b2d1ef682ec38fef4f
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        ports:
          http:
            port: &port 8000
      paperless-gpt:
        controller: paperless
        ports:
          http:
            port: 8080
      scanservjs:
        controller: paperless
        ports:
          http:
            port: 8090
    serviceMonitor:
      app:
        service:
          identifier: app
        endpoints:
          - port: http

    persistence:
      config:
        existingClaim: paperless
        globalMounts:
          - path: /config
      consume:
        type: nfs
        server: 10.0.30.134
        path: /medianfs/paperless/consume
        globalMounts:
          - path: /data/consume
        advancedMounts:
          paperless:
            scanservjs:
              - path: /var/lib/scanservjs/output
      scanservjs-config:
        type: configMap
        name: scanservjs-config
        advancedMounts:
          paperless:
            scanservjs:
              - path: /etc/scanservjs/config.local.js
                subPath: config.local.js
      pre-consume:
        type: configMap
        name: paperless-pre-consume
        defaultMode: 0755
        advancedMounts:
          paperless:
            app:
              - path: /scripts/rotate180.sh
                subPath: rotate180.sh
