---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scanservjs-config
data:
  config.local.js: |
    module.exports = {
      afterConfig(config) {
        config.port = 8090;
      }
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-pre-consume
data:
  rotate180.sh: |
    #!/usr/bin/env bash
    set -e
    DOCUMENT="$1"
    EXT="${DOCUMENT##*.}"
    if [[ "${EXT,,}" == "pdf" ]]; then
      python3 -c "
    import sys, pikepdf
    doc = pikepdf.open(sys.argv[1])
    for page in doc.pages:
        page.rotate(180, relative=True)
    doc.save(sys.argv[1])
    " "$DOCUMENT"
    else
      mogrify -rotate 180 "$DOCUMENT"
    fi
