---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stash
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      stash:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/stashapp/stash
              tag: v0.31.1
            env:
              TZ: ${TIMEZONE}
              HOME: /config
              USER: stash
              STASH_CONFIG_FILE: /config/config.yml
              STASH_PORT: &port 9999
              STASH_STASH: /data/
              STASH_GENERATED: /generated/
              STASH_METADATA: /metadata/
              STASH_CACHE: /cache/
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: stash-config
        advancedMounts:
          stash:
            app:
              - path: /config
      generated:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          stash:
            app:
              - path: /generated
      metadata:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-block
        advancedMounts:
          stash:
            app:
              - path: /metadata
      cache:
        type: emptyDir
        advancedMounts:
          stash:
            app:
              - path: /cache
      media:
        type: nfs
        server: 10.0.30.160
        path: /mnt/user/reddit
        advancedMounts:
          stash:
            app:
              - path: /data/reddit
                readOnly: true
      tmpfs:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          stash:
            app:
              - path: /tmp
