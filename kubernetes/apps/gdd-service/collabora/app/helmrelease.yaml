---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app collabora
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cloudflare-tunnel
      namespace: network
  values:
    controllers:
      collabora:
        annotations:
          secret.reloader.stakater.com/reload: collabora-secret
        containers:
          app:
            image:
              repository: collabora/code
              tag: 24.04.13.2.1
            env:
              TZ: America/Chicago
              # Regex of allowed Nextcloud domains — dots must be escaped
              domain: "next\\.${SECRET_DOMAIN}"
              # Disable SSL at the Collabora level; gateway handles TLS termination
              extra_params: >-
                --o:ssl.enable=false
                --o:ssl.termination=true
                --o:logging.level=information
                --o:home_mode.enable=true
              username: admin
              DONT_GEN_SSL_CERT: "1"
            envFrom:
              - secretRef:
                  name: collabora-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hosting/discovery
                    port: &port 9980
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /hosting/discovery
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Service
          gethomepage.dev/name: Collabora
          gethomepage.dev/icon: collabora.svg
          gethomepage.dev/description: "Document editing for Nextcloud"
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            group: Service
            depends-on:
              - CFtunnel
            conditions: ["[STATUS] == 200"]
            alerts:
              - type: ntfy
        hostnames: ["collabora.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      cache:
        type: emptyDir
        globalMounts:
          - path: /opt/cool/var/cache
