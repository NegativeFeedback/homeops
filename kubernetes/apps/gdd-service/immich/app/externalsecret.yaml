---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: kubernetes-secret-store
    kind: ClusterSecretStore
  target:
    name: immich-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_USER: "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        POSTGRES_DB: "gdd-service-immich"
        DB_URL: "postgresql://{{ .username }}:{{ .password }}@postgres-rw.database.svc.cluster.local:5432/gdd-service-immich"
  data:
    - secretKey: username
      remoteRef:
        key: immich-db-secret
        property: username
    - secretKey: password
      remoteRef:
        key: immich-db-secret
        property: password
