---
# yaml-language-server: $schema=https://kubernetes-schemas.18b.haus/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-route
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Media
    gethomepage.dev/name: Immich
    gethomepage.dev/icon: immich.svg
    gethomepage.dev/description: "Photo & video backup"
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |-
      group: Media
      depends-on:
        - CFtunnel
      conditions: ["[STATUS] == 200"]
      alerts:
        - type: ntfy
        - type: discord
        - type: github
spec:
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  hostnames:
    - "photos.${SECRET_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: immich-server
          port: 2283
