---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: immich
  namespace: database
spec:
  cluster:
    name: postgres
  name: gdd-service-immich
  owner: gdd-service-immich-user
  ensure: present
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: immich-db-password
  namespace: database
spec:
  length: 48
  digits: 10
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-secret
  namespace: database
spec:
  refreshInterval: 12h
  target:
    name: immich-db-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: gdd-service-immich-user
        password: "{{ .password | toString }}"
        POSTGRES_URL: "postgresql://gdd-service-immich-user:{{ .password | toString }}@postgres-rw.database.svc.cluster.local:5432/gdd-service-immich"
        POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_DB: "gdd-service-immich"
        POSTGRES_USER: "gdd-service-immich-user"
        POSTGRES_PASSWORD: "{{ .password | toString }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: immich-db-password
