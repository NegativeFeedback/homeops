---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-database
  namespace: gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo
  interval: 1h
  path: ./kubernetes/apps/gdd-service/forgejo/database
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
  namespace: &namespace gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: forgejo-database
  interval: 1h
  path: ./kubernetes/apps/gdd-service/forgejo/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      NS: *namespace
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_SCHEDULE_B2: '0 5 * * 4'
      VOLSYNC_SCHEDULE_LOCAL: '0 3 * * *'
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-runner
  namespace: gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo-runner
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: forgejo
  interval: 1h
  path: ./kubernetes/apps/gdd-service/forgejo/runner
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: gdd-service
  timeout: 5m
  wait: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-renovate
  namespace: gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo-renovate
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: forgejo
  interval: 1h
  path: ./kubernetes/apps/gdd-service/forgejo/renovate
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: gdd-service
  timeout: 5m
  wait: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
