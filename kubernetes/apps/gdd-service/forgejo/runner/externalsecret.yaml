---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: forgejo-runner-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RUNNER_TOKEN: "{{ .runnerToken }}"
  data:
    - secretKey: runnerToken
      remoteRef:
        key: "a4d58fb5-bcc2-457d-b155-b45e00424674"
        property: token
