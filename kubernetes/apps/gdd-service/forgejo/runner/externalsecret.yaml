---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: forgejo-runner-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RUNNER_TOKEN: "{{ .runnerToken }}"
  data:
    - secretKey: runnerToken
      remoteRef:
        # Create this item in Bitwarden after generating a runner token
        # in Forgejo: Admin → Actions → Runners → Create new runner
        key: "forgejo-runner-token"
        property: token
