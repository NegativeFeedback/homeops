---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: renovate-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Personal access token for the renovate bot user in Forgejo
        # Create a 'renovate' user in Forgejo, then generate a token with
        # read/write access to repos and pull requests
        RENOVATE_TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: "forgejo-renovate-token"
        property: token
