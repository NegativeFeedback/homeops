---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: gdd-service
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
              image: ghcr.io/renovatebot/renovate:39.236.0
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secret
                      key: RENOVATE_TOKEN
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config/config.js
                - name: LOG_LEVEL
                  value: info
              volumeMounts:
                - name: config
                  mountPath: /usr/src/app/config
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: config
              configMap:
                name: renovate-config
