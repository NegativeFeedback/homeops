---
# yaml-language-server: $schema=https://kubernetes-schemas.18b.haus/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-route
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Service
    gethomepage.dev/name: Forgejo
    gethomepage.dev/icon: gitea.svg
    gethomepage.dev/description: "Self-hosted Git service"
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |-
      group: Service
      depends-on:
        - CFtunnel
      conditions: ["[STATUS] == 200"]
      alerts:
        - type: ntfy
        - type: discord
        - type: github
spec:
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  hostnames:
    - "git.${SECRET_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: forgejo-http
          port: 3000
