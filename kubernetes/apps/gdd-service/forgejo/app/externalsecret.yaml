---
# Reads the auto-generated DB credentials from the database namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: kubernetes-secret-store
    kind: ClusterSecretStore
  target:
    name: forgejo-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_USER: "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: forgejo-db-secret
        property: username
    - secretKey: password
      remoteRef:
        key: forgejo-db-secret
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-oidc-secret
  namespace: gdd-service
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: forgejo-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: "c6b9ef08-8fc5-4a9c-9b80-b41d0165c570"
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: "c6108ed5-8f29-4720-a359-b41d0165d973"
