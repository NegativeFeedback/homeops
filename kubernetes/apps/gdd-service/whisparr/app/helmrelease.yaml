---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app whisparr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      whisparr:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/hotio/whisparr
              tag: v3-v3.3.4@sha256:34726942232998ec714c05da82da7ce1e225c6e37046f44df5d0afe55ad3979b
            env:
              TZ: America/Chicago
              # hotio s6-overlay drops to this uid/gid at runtime; keep in sync with
              # defaultPodOptions.securityContext and VOLSYNC_MOVER_* in ks.yaml.
              PUID: "1000"
              PGID: "1000"
              UMASK: "002"
              WHISPARR__APP__INSTANCENAME: Whisparr
              WHISPARR__LOG__LEVEL: info
              WHISPARR__LOG__ANALYTICSENABLED: "False"
              WHISPARR__LOG__DBENABLED: "False"
              WHISPARR__SERVER__PORT: &port 6969
              WHISPARR__UPDATE__BRANCH: eros
            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              # hotio's s6-overlay init writes to the root filesystem, so it can't
              # run with a read-only rootfs (unlike the home-operations *arr images).
              readOnlyRootFilesystem: false
              # s6-overlay starts as root (see pod securityContext) to fix /run and
              # chown /config, then drops to PUID/PGID. Dropping ALL caps would strip
              # the SETUID/SETGID/CHOWN it needs to do that, so add them back.
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID", "KILL"]
            resources:
              requests:
                cpu: 10m
                memory: 150Mi
              limits:
                memory: 1000Mi
    defaultPodOptions:
      securityContext:
        # hotio images must start as root so s6-overlay can set up /run and drop to
        # PUID/PGID (=1000). fsGroup 1000 keeps the config PVC writable by the app.
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        enabled: true
        existingClaim: *app
      media:
        type: nfs
        server: 10.0.30.134
        path: /medianfs
        globalMounts:
          - path: /mnt/media
