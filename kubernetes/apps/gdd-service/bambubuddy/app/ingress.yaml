---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bambubuddy
  annotations:
    tailscale.com/proxy-group: ts-ingress
spec:
  ingressClassName: tailscale
  rules:
    - host: bambubuddy.barn-walleye.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bambubuddy
                port:
                  number: 8000
  tls:
    - hosts:
        - bambubuddy.barn-walleye.ts.net
