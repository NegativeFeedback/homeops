---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambubuddy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      bambubuddy:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4.2@sha256:f05ab29a272f14e9880462e867d7f938e7deb0f9559c9b4e714d282897d4a8e8
            env:
              TZ: ${TIMEZONE}
              LOG_LEVEL: INFO
              PORT: &port 8000
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - NET_BIND_SERVICE
                drop:
                  - ALL
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 4Gi
#          bambu-studio-api:
#            image:
#              repository: ghcr.io/negativefeedback/bambu-studio-api
#              tag: bambu02.06.00.51
#            env:
#              NODE_ENV: production
#              PORT: &slicerPort 3000
#            probes:
#              liveness: &slicerProbes
#                enabled: true
#                custom: true
#                spec:
#                  httpGet:
#                    path: /health
#                    port: *slicerPort
#                  initialDelaySeconds: 30
#                  periodSeconds: 30
#                  timeoutSeconds: 5
#                  failureThreshold: 3
#              readiness: *slicerProbes
#            resources:
#              requests:
#                cpu: 50m
#                memory: 512Mi
#              limits:
#                memory: 2Gi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [{
            "name": "multus-vlan50",
            "namespace": "network",
            "ips": ["10.0.50.202/24"]
          }]
      # TODO: remove nodeSelector once multus VLANs are configured on all nodes
      nodeSelector:
        kubernetes.io/hostname: gddnet-w9
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          bambubuddy:
            app:
              - path: /app/data
            bambu-studio-api:
              - path: /app/data
                subPath: slicer-bambu
      tmpfs:
        type: emptyDir
        advancedMounts:
          bambubuddy:
            app:
              - path: /app/logs
                subPath: logs
              - path: /tmp
                subPath: tmp
            bambu-studio-api:
              - path: /tmp
                subPath: slicer-tmp
