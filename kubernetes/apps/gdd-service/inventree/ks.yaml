---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: inventree-database
  namespace: gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: inventree
  interval: 1h
  path: ./kubernetes/apps/gdd-service/inventree/database
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app inventree
  namespace: &namespace gdd-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  dependsOn:
    - name: inventree-database
  interval: 1h
  path: ./kubernetes/apps/gdd-service/inventree/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      NS: *namespace
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_SCHEDULE_B2: '0 5 * * 4'
      VOLSYNC_SCHEDULE_LOCAL: '0 3 * * *'
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
