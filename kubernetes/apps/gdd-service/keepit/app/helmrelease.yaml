---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keepit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      keepit:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: git.gddnet.io/negativefeedback/keepit
              tag: v0.1.46@sha256:ea7cdc31fcb5fb123107cbcd8cf22b6418ee2fb8b93fbc068abfb9ec6bd4f549
            env:
              TZ: ${TIMEZONE}
              PORT: &port 8080
              DATA_PATH: /media
              DB_PATH: /db/keepit.db
              REDDIT_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.3
              DEFAULT_SCRAPE_INTERVAL_HOURS: "24"
              MAX_CONCURRENT_DOWNLOADS: "12"
              DOWNLOAD_TIMEOUT_SECONDS: "180"
              FAST_CHECK_INTERVAL_MINUTES: "0"
              DELETION_CHECK_INTERVAL_HOURS: "168"
              WEBHOOK_URL: https://discord.com/api/webhooks/1441144884802224178/1tWxLnoiF-z7u-3DYi1dl1HXJWJM4BMh-2IoLI8BvV0g2J3GvtXdAEvl9viIt86hCweR
              FFMPEG_PATH: ffmpeg
              MAX_RETRIES: "3"
              YTDLP_PATH: yt-dlp
              BROWSER_HEADLESS: "true"
              SESSION_AUTO_SCRAPE: "false"
              GLUETUN_CONTROL_URL: http://localhost:8000
              VIDEO_REQUIRE_VPN: "true"


            envFrom:
              - secretRef:
                  name: keepit-secret
            securityContext:
              allowPrivilegeEscalation: false
              # go-rod/chromium writes to /tmp and cache dirs; not read-only
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 8Gi
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              SERVER_COUNTRIES: United States
              SERVER_CITIES: Chicago,New York
              # pod CIDR, service CIDR, and node CIDR (10.0.31.0/24) — the node
              # subnet is required so kubelet liveness/readiness probe replies
              # route back out eth0 instead of into the WireGuard tunnel.
              FIREWALL_OUTBOUND_SUBNETS: 10.244.0.0/16,10.96.0.0/12,10.0.31.0/24
              HTTP_CONTROL_SERVER_ADDRESS: ":8000"
              # open inbound on the app port (ingress + probes) and the gluetun
              # control port (its liveness probe). gluetun's INPUT policy is DROP,
              # so without these every kubelet probe and ingress request is dropped.
              FIREWALL_INPUT_PORTS: "8080,8000"
              HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: /gluetun/auth/config.toml
              DOT: "on"
              UPDATER_PERIOD: 24h
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: keepit-gluetun-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN"]
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/openvpn/status
                    port: 8000
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  failureThreshold: 5
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      # Video downloads use gluetun's DoT resolver, which doesn't know
      # cluster.local. With the default ndots:5, external names like
      # media.redgifs.com get the cluster search domains prepended first and
      # the musl resolver fails before trying the bare name. ndots:1 makes
      # dotted external names resolve as-is.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      db:
        existingClaim: keepit-db
        advancedMounts:
          keepit:
            app:
              - path: /db
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 500Gi
        advancedMounts:
          keepit:
            app:
              - path: /data
      media:
        type: nfs
        server: 10.0.30.175
        path: /mnt/user/reddit
        advancedMounts:
          keepit:
            app:
              - path: /media
      tmpfs:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          keepit:
            app:
              - path: /tmp
                subPath: tmp
              - path: /dev/shm
                subPath: shm
      gluetun-auth:
        type: configMap
        name: keepit-gluetun-auth
        advancedMounts:
          keepit:
            gluetun:
              - path: /gluetun/auth/config.toml
                subPath: config.toml
                readOnly: true
