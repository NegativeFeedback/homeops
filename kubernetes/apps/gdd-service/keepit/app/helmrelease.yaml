---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keepit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      keepit:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: git.gddnet.io/negativefeedback/keepit
              tag: v0.1.21@sha256:e114a468070a80ceb39aced72f8ebb933d9175057e5c2afb514f2ed31a959a92
            env:
              TZ: ${TIMEZONE}
              PORT: &port 8080
              DATA_PATH: /data
              DB_PATH: /data/keepit.db
              REDDIT_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.3
              DEFAULT_SCRAPE_INTERVAL_HOURS: "24"
              MAX_CONCURRENT_DOWNLOADS: "12"
              DOWNLOAD_TIMEOUT_SECONDS: "180"
              FAST_CHECK_INTERVAL_MINUTES: "0"
              DELETION_CHECK_INTERVAL_HOURS: "168"
              WEBHOOK_URL: https://discord.com/api/webhooks/1441144884802224178/1tWxLnoiF-z7u-3DYi1dl1HXJWJM4BMh-2IoLI8BvV0g2J3GvtXdAEvl9viIt86hCweR
              FFMPEG_PATH: ffmpeg
              MAX_RETRIES: "3"
              YTDLP_PATH: yt-dlp
              BROWSER_HEADLESS: "true"
              SESSION_AUTO_SCRAPE: "false"

            envFrom:
              - secretRef:
                  name: keepit-secret
            securityContext:
              allowPrivilegeEscalation: false
              # go-rod/chromium writes to /tmp and cache dirs; not read-only
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 8Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      db:
        existingClaim: keepit-db
        advancedMounts:
          keepit:
            app:
              - path: /db
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 500Gi
        advancedMounts:
          keepit:
            app:
              - path: /data
      media:
        type: nfs
        server: 10.0.30.160
        path: /mnt/user/reddit
        advancedMounts:
          keepit:
            app:
              - path: /media
      tmpfs:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          keepit:
            app:
              - path: /tmp
                subPath: tmp
              - path: /dev/shm
                subPath: shm
