---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keepit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      keepit:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: git.gddnet.io/negativefeedback/keepit
              tag: v0.1.5@sha256:e054b5590d2e3c22d51b8465a9af851066343ee6c511b9eb07cc4412d92bc7d5
            env:
              TZ: ${TIMEZONE}
              PORT: &port 8080
              DATA_PATH: /data
              DB_PATH: /data/keepit.db
              REDDIT_USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.3
              DEFAULT_SCRAPE_INTERVAL_HOURS: "24"
              MAX_CONCURRENT_DOWNLOADS: "8"
              YTDLP_PATH: yt-dlp
              BROWSER_HEADLESS: "true"
            envFrom:
              - secretRef:
                  name: keepit-secret
            securityContext:
              allowPrivilegeEscalation: false
              # go-rod/chromium writes to /tmp and cache dirs; not read-only
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 500Gi
        advancedMounts:
          keepit:
            app:
              - path: /data
      tmpfs:
        type: emptyDir
        medium: Memory
        sizeLimit: 512Mi
        advancedMounts:
          keepit:
            app:
              - path: /tmp
                subPath: tmp
              - path: /dev/shm
                subPath: shm
