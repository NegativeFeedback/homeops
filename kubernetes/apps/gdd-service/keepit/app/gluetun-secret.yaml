---
# WireGuard credentials for the gluetun egress sidecar. Create a Bitwarden item with your
# provider's WireGuard config values and point the remoteRef keys below at it:
#   WIREGUARD_PRIVATE_KEY  — the [Interface] PrivateKey
#   WIREGUARD_ADDRESSES    — the [Interface] Address (e.g. 10.64.0.2/32)
# For Mullvad these come from https://mullvad.net/account/wireguard-config (generate a key).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keepit-gluetun-secret
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  data:
    - secretKey: WIREGUARD_PRIVATE_KEY
      remoteRef:
        key: "ffb9b7b6-5e5f-4550-bf04-b46e018189a8"
        property: WIREGUARD_PRIVATE_KEY

