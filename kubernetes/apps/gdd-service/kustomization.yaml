---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gdd-service
components:
  - ../../components/common
resources:
  - ./calibre/ks.yaml
  - ./shelfmark/ks.yaml
  - ./ntfy/ks.yaml
  - ./donetick/ks.yaml
  - ./tandoor/ks.yaml
  - ./homepage/ks.yaml
  - ./minecraft/ks.yaml
  - ./foundryvtt/ks.yaml
  - ./minecraft-create/ks.yaml
  - ./nextcloud/ks.yaml
  - ./monica/ks.yaml
  - ./paperless/ks.yaml
  - ./homebox/ks.yaml
  - ./forgejo/ks.yaml
  - ./collabora/ks.yaml
  - ./immich/ks.yaml
  - ./sparkyfitness/ks.yaml
  - ./bambubuddy/ks.yaml
  - ./spoolman/ks.yaml
  - ./inventree/ks.yaml
  - ./keepit/ks.yaml
  - ./stash/ks.yaml
  - ./tracefinity/ks.yaml

patches:
  - patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        labels:
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/warn: privileged
        name: not-used
    target:
      kind: Namespace
