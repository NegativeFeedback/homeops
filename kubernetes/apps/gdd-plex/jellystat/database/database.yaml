---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: jellystat
  namespace: database
spec:
  cluster:
    name: postgres
  name: gdd_jellystat
  owner: gdd_jellystat_user
  ensure: present
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: jellystat-db-password
  namespace: database
spec:
  length: 48
  digits: 10
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellystat-db-secret
  namespace: database
spec:
  refreshInterval: 12h
  target:
    name: jellystat-db-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: gdd_jellystat_user
        password: "{{ .password | toString }}"
        POSTGRES_URL: "postgresql://gdd_jellystat_user:{{ .password | toString }}@postgres-rw.database.svc.cluster.local:5432/gdd_jellystat"
        POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_DB: "gdd_jellystat"
        POSTGRES_USER: "gdd_jellystat_user"
        POSTGRES_PASSWORD: "{{ .password | toString }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: jellystat-db-password
