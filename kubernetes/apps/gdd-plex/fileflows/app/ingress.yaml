---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fileflows
  annotations:
    tailscale.com/proxy-group: ts-ingress
spec:
  ingressClassName: tailscale
  rules:
    - host: fileflows.barn-walleye.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fileflows
                port:
                  number: 5000
  tls:
    - hosts:
        - fileflows.barn-walleye.ts.net
