---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app fileflows
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      fileflows:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/revenz/fileflows
              tag: latest
            env:
              TZ: America/Chicago
              PUID: "0"
              PGID: "0"
              TempPathHost: /temp
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 5000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              readOnlyRootFilesystem: false
              allowPrivilegeEscalation: true
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "FSETID", "KILL", "SETGID", "SETUID", "SETPCAP"]
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
                gpu.intel.com/xe: "1"
              limits:
                memory: 8Gi
                gpu.intel.com/xe: "1"
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: intel.feature.node.kubernetes.io/gpu
                    operator: In
                    values: ["true"]
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/Data
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/Logs
      transcode-cache:
        type: emptyDir
        globalMounts:
          - path: /temp
      media:
        type: nfs
        server: 10.0.30.134
        path: /medianfs
        globalMounts:
          - path: /mnt/media
      reddit:
        type: nfs
        server: 10.0.30.175
        path: /mnt/user/reddit
        globalMounts:
          - path: /data/reddit
      p:
        type: nfs
        server: 10.0.30.175
        path: /mnt/user/p
        globalMounts:
          - path: /mnt/p
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
