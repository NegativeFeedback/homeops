---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tailscale
spec:
  interval: 30m
  url: https://pkgs.tailscale.com/helmcharts
  timeout: 3m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      version: 1.86.5
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: tailscale
  values:
    operatorConfig:
      hostname: "tailscale-operator"
      defaultTags:
        - "tag:k8s-operator"
    apiServerProxyConfig:
      mode: "true"
  valuesFrom:
    - kind: Secret
      name: tailscale-operator
      valuesKey: client_id
      targetPath: oauth.clientId
    - kind: Secret
      name: tailscale-operator
      valuesKey: client_secret
      targetPath: oauth.clientSecret
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: ts-ingress
spec:
  type: ingress
  replicas: 3
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: ts-kube
spec:
  type: kube-apiserver
  replicas: 3
---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: connector
  namespace: network
spec:
  hostnamePrefix: "app-connector"
  tags:
    - "tag:connector"

  appConnector:
    routes:
      - 10.0.10.0/24
      - 10.0.30.0/24
      - 10.0.31.0/24
      - 10.0.50.0/24

  replicas: 2
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: connector-pdb
  namespace: network
spec:
  minAvailable: 1
  selector:
    matchLabels:
      tailscale.com/parent-resource: connector
      tailscale.com/parent-resource-type: connector
